<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spin Undian - Kuota Per User</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      border-radius: 56px;
      padding: 20px 20px 30px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.4);
      text-align: center;
      border: 1px solid rgba(255,215,0,0.3);
    }
    h1 { color: #FFD966; margin: 0 0 8px; font-size: 1.9rem; }
    input {
      width: 100%;
      padding: 14px 18px;
      margin: 12px 0;
      border-radius: 60px;
      border: none;
      font-size: 1rem;
      text-align: center;
      background: #2c3e33dd;
      color: white;
      font-weight: bold;
    }
    button {
      background: linear-gradient(135deg, #f39c12, #e67e22);
      border: none;
      font-weight: bold;
      padding: 12px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 1.2rem;
      color: white;
      transition: 0.1s;
    }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .wheel-container {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 15px auto;
    }
    canvas {
      width: 100% !important;
      height: 100% !important;
      border-radius: 50%;
      box-shadow: 0 12px 28px rgba(0,0,0,0.5), 0 0 0 6px #f9e0a0;
    }
    .pointer {
      position: absolute;
      top: -28px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-top: 52px solid #ffc107;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4));
      z-index: 5;
    }
    .info-peserta {
      background: #000000aa;
      border-radius: 60px;
      padding: 12px 18px;
      margin: 10px 0 20px;
      color: white;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
    }
    .logout-btn { background: #c0392b; padding: 6px 16px; font-size: 0.8rem; margin: 0; }
    #result {
      background: #1e1e2fcc;
      border-radius: 60px;
      padding: 12px;
      margin: 15px 0;
      font-size: 1.2rem;
      font-weight: bold;
      color: #ffe484;
    }
    .history {
      background: #0f1724cc;
      border-radius: 32px;
      padding: 12px 18px;
      margin-top: 20px;
      text-align: left;
      max-height: 170px;
      overflow-y: auto;
    }
    .history h3 { margin: 0 0 8px; color: #ffb347; text-align: center; }
    .history ul { margin: 0; padding-left: 20px; color: #ddd; }
    .footer { font-size: 0.7rem; margin-top: 18px; color: #aabbcc; }
  </style>
</head>
<body>
<div class="container">
  <div id="loginSection">
    <h1>🎡 SPIN UNDIAN 🎁</h1>
    <div class="sub">✨ Setiap hari dapat kesempatan ✨</div>
    <input type="text" id="loginUsername" placeholder="Masukkan username terdaftar" autocomplete="off">
    <button id="loginBtn">🔐 LOGIN & MULAI</button>
    <div id="loginMsg"></div>
  </div>
  <div id="wheelSection" style="display: none;">
    <div class="info-peserta">
      <div><span>👤 <strong id="userUsername"></strong></span></div>
      <button id="logoutBtn" class="logout-btn">🚪 Keluar</button>
      <div>🎲 Sisa spin: <strong id="remainingSpin">0</strong> / <span id="maxSpinPerDay"></span></div>
    </div>
    <div class="wheel-container">
      <canvas id="wheelCanvas" width="600" height="600"></canvas>
      <div class="pointer"></div>
    </div>
    <button id="spinBtn" disabled>✨ PUTAR RODA ✨</button>
    <div id="result">✨ Login untuk mulai bermain ✨</div>
    <div class="history">
      <h3>📜 Riwayat spin Anda</h3>
      <ul id="historyList"><li>Belum ada aktivitas</li></ul>
    </div>
    <div class="footer">Setiap putaran mengurangi kuota harian. Hadiah berdasarkan probabilitas.</div>
  </div>
</div>
<script>
  // ================== KONFIGURASI ==================
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbxN5EBovivOjZL14IXV1oUp74FWBOBwjWlb2NkbmDb41fpOIRqxxc0KLxN0qf2Psomx/exec"; // GANTI DENGAN URL APPS SCRIPT ANDA
  
  let HADIAH_DISPLAY = [];
  let SEGMENTS = 0, ANGLE_PER_SEG = 0;
  let currentRotation = 0, spinning = false, animationId = null;
  let currentToken = null, currentRemainingSpin = 0, currentMaxSpin = 0, currentUsername = "";
  let localHistory = [];
  
  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const loginSection = document.getElementById('loginSection');
  const wheelSection = document.getElementById('wheelSection');
  const spinBtn = document.getElementById('spinBtn');
  const resultDiv = document.getElementById('result');
  const remainingSpan = document.getElementById('remainingSpin');
  const maxSpinSpan = document.getElementById('maxSpinPerDay');
  const userUsernameSpan = document.getElementById('userUsername');
  const historyList = document.getElementById('historyList');
  
  async function callBackend(action, data = {}) {
    try {
      const response = await fetch(BACKEND_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action, ...data })
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return await response.json();
    } catch (err) {
      return { success: false, message: `Gagal terhubung ke server: ${err.message}` };
    }
  }
  
  function drawWheel(rotationRad) {
    if (!HADIAH_DISPLAY.length) return;
    const w = canvas.width, h = canvas.height;
    const centerX = w/2, centerY = h/2;
    const radius = w/2 * 0.92;
    ctx.clearRect(0, 0, w, h);
    for (let i = 0; i < SEGMENTS; i++) {
      const start = i * ANGLE_PER_SEG + rotationRad;
      const end = (i+1) * ANGLE_PER_SEG + rotationRad;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, radius, start, end);
      ctx.fillStyle = HADIAH_DISPLAY[i].warna;
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(start + ANGLE_PER_SEG/2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 18px 'Segoe UI'";
      ctx.fillStyle = "#fff";
      ctx.shadowBlur = 3;
      let label = HADIAH_DISPLAY[i].nama;
      if (label.length > 14) label = label.substring(0,12)+'..';
      ctx.fillText(label, radius * 0.62, 8);
      ctx.restore();
    }
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius * 0.16, 0, 2*Math.PI);
    ctx.fillStyle = "#FFD966";
    ctx.fill();
  }
  
  function spinToSegment(targetSegmentIndex) {
    return new Promise((resolve) => {
      if (spinning) return resolve();
      spinning = true;
      spinBtn.disabled = true;
      resultDiv.innerHTML = "🌀 Memutar roda ... 🌀";
      const pointerAngle = Math.PI / 2;
      const midOfSegment = (targetSegmentIndex + 0.5) * ANGLE_PER_SEG;
      let targetRot = pointerAngle - midOfSegment;
      targetRot = ((targetRot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      const extraFullRot = Math.floor(Math.random() * 10) + 8;
      const targetDelta = (extraFullRot * 2 * Math.PI) + targetRot;
      const startRot = currentRotation;
      const startTime = performance.now();
      const spinDuration = 4800; // 4.8 detik
      function animate(now) {
        const elapsed = now - startTime;
        let t = Math.min(1, elapsed / spinDuration);
        const easeOut = 1 - Math.pow(1-t, 5); // lambat di akhir
        const newRot = startRot + targetDelta * easeOut;
        currentRotation = newRot % (2*Math.PI);
        drawWheel(currentRotation);
        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          currentRotation = targetRot;
          drawWheel(currentRotation);
          spinning = false;
          spinBtn.disabled = (currentRemainingSpin <= 0);
          resolve();
        }
      }
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(animate);
    });
  }
  
  async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    if (!username) { document.getElementById('loginMsg').innerText = 'Masukkan username!'; return; }
    document.getElementById('loginBtn').disabled = true;
    document.getElementById('loginMsg').innerText = 'Memproses...';
    const resp = await callBackend('login', { username });
    document.getElementById('loginBtn').disabled = false;
    if (resp.success) {
      currentToken = resp.token;
      localStorage.setItem('spinToken', currentToken);
      currentRemainingSpin = resp.remainingSpin;
      currentMaxSpin = resp.maxSpinPerDay;
      currentUsername = resp.username;
      userUsernameSpan.innerText = currentUsername;
      remainingSpan.innerText = currentRemainingSpin;
      maxSpinSpan.innerText = currentMaxSpin;
      spinBtn.disabled = (currentRemainingSpin <= 0);
      resultDiv.innerHTML = currentRemainingSpin > 0 ? `✅ Sisa spin: ${currentRemainingSpin}` : "❌ Kuota habis hari ini.";
      loginSection.style.display = 'none';
      wheelSection.style.display = 'block';
      const hadiahResp = await callBackend('getHadiahList');
      if (hadiahResp && Array.isArray(hadiahResp)) {
        HADIAH_DISPLAY = hadiahResp;
        SEGMENTS = HADIAH_DISPLAY.length;
        ANGLE_PER_SEG = (Math.PI * 2) / SEGMENTS;
        drawWheel(currentRotation);
      }
      const historyResp = await callBackend('getUserHistory', { username: currentUsername, limit: 8 });
      if (historyResp && Array.isArray(historyResp)) {
        localHistory = historyResp.map(h => `${new Date(h.timestamp).toLocaleTimeString()} → ${h.hadiah}`);
        historyList.innerHTML = localHistory.length ? localHistory.map(i => `<li>${i}</li>`).join('') : '<li>Belum ada spin.</li>';
      }
    } else {
      document.getElementById('loginMsg').innerHTML = `❌ ${resp.message}`;
    }
  }
  
  function logout() {
    localStorage.removeItem('spinToken');
    currentToken = null;
    loginSection.style.display = 'block';
    wheelSection.style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginMsg').innerHTML = '';
    currentRotation = 0;
    if (HADIAH_DISPLAY.length) drawWheel(0);
    spinning = false;
  }
  
  async function doSpin() {
    if (spinning) return;
    if (currentRemainingSpin <= 0) {
      resultDiv.innerHTML = `⛔ Batas spin hari ini (${currentMaxSpin}) sudah tercapai.`;
      return;
    }
    spinBtn.disabled = true;
    resultDiv.innerHTML = "🎲 Menentukan hadiah... 🎲";
    const resp = await callBackend('spin', { token: currentToken });
    if (resp.success) {
      const selectedHadiah = resp.hadiah;
      const idx = HADIAH_DISPLAY.findIndex(h => h.nama === selectedHadiah);
      if (idx !== -1) {
        await spinToSegment(idx);
        resultDiv.innerHTML = `🎉🎉 ${resp.message} 🎉🎉`;
        currentRemainingSpin = resp.remainingSpin;
        remainingSpan.innerText = currentRemainingSpin;
        spinBtn.disabled = (currentRemainingSpin <= 0);
        const timeNow = new Date().toLocaleTimeString();
        localHistory.unshift(`${timeNow} → ${selectedHadiah}`);
        if (localHistory.length > 8) localHistory.pop();
        historyList.innerHTML = localHistory.map(i => `<li>${i}</li>`).join('');
        if (currentRemainingSpin === 0) resultDiv.innerHTML += `<br>⚠️ Sisa spin habis. Besok lagi!`;
      } else {
        resultDiv.innerHTML = "⚠️ Hadiah tidak dikenali.";
        spinBtn.disabled = false;
      }
    } else {
      resultDiv.innerHTML = `❌ Gagal: ${resp.message}`;
      spinBtn.disabled = false;
      if (resp.message.includes('kadaluarsa') || resp.message.includes('token')) logout();
    }
  }
  
  async function cekTokenOtomatis() {
    const token = localStorage.getItem('spinToken');
    if (!token) return;
    const resp = await callBackend('cekSesi', { token });
    if (resp.valid) {
      currentToken = token;
      currentRemainingSpin = resp.remainingSpin;
      currentMaxSpin = resp.maxSpinPerDay;
      currentUsername = resp.username;
      userUsernameSpan.innerText = currentUsername;
      remainingSpan.innerText = currentRemainingSpin;
      maxSpinSpan.innerText = currentMaxSpin;
      spinBtn.disabled = (currentRemainingSpin <= 0);
      resultDiv.innerHTML = currentRemainingSpin > 0 ? `✨ Sisa spin: ${currentRemainingSpin}` : "😢 Kuota habis hari ini.";
      loginSection.style.display = 'none';
      wheelSection.style.display = 'block';
      const hadiahResp = await callBackend('getHadiahList');
      if (hadiahResp && Array.isArray(hadiahResp)) {
        HADIAH_DISPLAY = hadiahResp;
        SEGMENTS = HADIAH_DISPLAY.length;
        ANGLE_PER_SEG = (Math.PI * 2) / SEGMENTS;
        drawWheel(currentRotation);
      }
      const historyResp = await callBackend('getUserHistory', { username: currentUsername, limit: 8 });
      if (historyResp && Array.isArray(historyResp)) {
        localHistory = historyResp.map(h => `${new Date(h.timestamp).toLocaleTimeString()} → ${h.hadiah}`);
        historyList.innerHTML = localHistory.length ? localHistory.map(i => `<li>${i}</li>`).join('') : '<li>Belum ada spin.</li>';
      }
    } else {
      localStorage.removeItem('spinToken');
    }
  }
  
  window.addEventListener('load', () => {
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    spinBtn.addEventListener('click', doSpin);
    cekTokenOtomatis();
  });
</script>
</body>
</html>
