<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spin Undian - Kuota Per User</title>
  <style>
    /* Sama seperti style sebelumnya, bisa Anda copy utuh */
    * { box-sizing: border-box; user-select: none; }
    body {
      background: linear-gradient(145deg, #1e2a3a 0%, #0f1724 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(4px);
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.3);
      text-align: center;
    }
    /* sisanya sama... (saya singkat agar tidak terlalu panjang) */
  </style>
</head>
<body>
<div class="container">
  <div id="loginSection">
    <h1>🎡 Spin Undian 🎁</h1>
    <p>Masukkan username yang sudah didaftarkan oleh admin</p>
    <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
    <button id="loginBtn">🔐 Login</button>
    <div id="loginMsg" style="color: #ffaa66;"></div>
  </div>

  <div id="wheelSection" style="display:none;">
    <div class="info-peserta">
      <span>👤 <strong id="userUsername"></strong></span>
      <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
      <div>🎲 Sisa spin hari ini: <strong id="remainingSpin">0</strong> / <span id="maxSpinPerDay"></span></div>
    </div>
    <div class="wheel-container">
      <canvas id="wheelCanvas" width="600" height="600"></canvas>
      <div class="pointer"></div>
    </div>
    <button id="spinBtn" disabled>✨ PUTAR RODA ✨</button>
    <div id="result"></div>
    <div class="history">
      <h3>📜 Riwayat spin Anda</h3>
      <ul id="historyList"><li>Login untuk mulai</li></ul>
    </div>
    <div class="footer">Hasil ditentukan berdasarkan probabilitas yang diatur admin.</div>
  </div>
</div>

<script>
  // ================== KONFIGURASI ==================
  // Ganti dengan URL Web App dari Google Apps Script
  const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwoRBhiASRaK5QcUYECvACazWFYBioZUwZqym7ssX_vpgBwj08cZ-DPBdrme7Z7jPMBoA/exec"; // PASTE URL ANDA
  
  // Data hadiah
  let HADIAH_DISPLAY = [];
  let SEGMENTS = 0;
  let ANGLE_PER_SEG = 0;
  
  let currentRotation = 0;
  let spinning = false;
  let spinDuration = 2000;
  let animationId = null;
  let currentToken = null;
  let currentRemainingSpin = 0;
  let currentMaxSpin = 0;
  let localHistory = [];
  let currentUsername = "";

  const canvas = document.getElementById('wheelCanvas');
  const ctx = canvas.getContext('2d');
  const loginSection = document.getElementById('loginSection');
  const wheelSection = document.getElementById('wheelSection');
  const spinBtn = document.getElementById('spinBtn');
  const resultDiv = document.getElementById('result');
  const remainingSpan = document.getElementById('remainingSpin');
  const maxSpinSpan = document.getElementById('maxSpinPerDay');
  const userUsernameSpan = document.getElementById('userUsername');
  const historyList = document.getElementById('historyList');

  // Helper untuk panggil backend
  async function callBackend(action, data = {}) {
    const payload = { action, ...data };
    const response = await fetch(BACKEND_URL, {
      method: 'POST',
      mode: 'cors',
      cache: 'no-cache',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    return await response.json();
  }

  // Gambar roda (sama seperti sebelumnya)
  function drawWheel(rotationRad) {
    if (!HADIAH_DISPLAY.length) return;
    const w = canvas.width, h = canvas.height;
    const centerX = w/2, centerY = h/2;
    const radius = w/2 * 0.92;
    ctx.clearRect(0, 0, w, h);
    for (let i = 0; i < SEGMENTS; i++) {
      const start = i * ANGLE_PER_SEG + rotationRad;
      const end = (i+1) * ANGLE_PER_SEG + rotationRad;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.arc(centerX, centerY, radius, start, end);
      ctx.closePath();
      ctx.fillStyle = HADIAH_DISPLAY[i].warna;
      ctx.fill();
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.save();
      ctx.translate(centerX, centerY);
      ctx.rotate(start + ANGLE_PER_SEG/2);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "bold 14px 'Segoe UI'";
      ctx.fillStyle = "#fff";
      ctx.shadowBlur = 3;
      let label = HADIAH_DISPLAY[i].nama;
      if (label.length > 12) label = label.substring(0,10)+'..';
      ctx.fillText(label, radius * 0.68, 8);
      ctx.restore();
    }
    ctx.beginPath();
    ctx.arc(centerX, centerY, radius * 0.18, 0, 2*Math.PI);
    ctx.fillStyle = "#ffcc33";
    ctx.fill();
  }

  // Animasi spin (sama)
  function spinToSegment(targetSegmentIndex) {
    return new Promise((resolve) => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      resultDiv.innerHTML = "🌀 Memutar... 🌀";
      
      const pointerAngle = Math.PI / 2; // pointer ke bawah
      const midOfSegment = (targetSegmentIndex + 0.5) * ANGLE_PER_SEG;
      let targetRot = pointerAngle - midOfSegment;
      targetRot = ((targetRot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
      
      const extraFullRot = Math.floor(Math.random() * 8) + 6;
      const targetDelta = (extraFullRot * 2 * Math.PI) + targetRot;
      const startRot = currentRotation;
      const startTime = performance.now();
      
      function animate(now) {
        const elapsed = now - startTime;
        let t = Math.min(1, elapsed / spinDuration);
        const easeOut = 1 - Math.pow(1-t, 3);
        const newRot = startRot + targetDelta * easeOut;
        currentRotation = newRot % (2*Math.PI);
        drawWheel(currentRotation);
        if (t < 1) {
          requestAnimationFrame(animate);
        } else {
          currentRotation = targetRot;
          drawWheel(currentRotation);
          spinning = false;
          spinBtn.disabled = (currentRemainingSpin <= 0);
          resolve();
        }
      }
      if (animationId) cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(animate);
    });
  }

  // Login
  async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    if (!username) {
      document.getElementById('loginMsg').innerText = 'Masukkan username!';
      return;
    }
    const loginBtn = document.getElementById('loginBtn');
    loginBtn.disabled = true;
    document.getElementById('loginMsg').innerText = 'Memproses...';
    
    try {
      const resp = await callBackend("login", { username });
      if (resp.success) {
        currentToken = resp.token;
        localStorage.setItem('spinToken', currentToken);
        currentRemainingSpin = resp.remainingSpin;
        currentMaxSpin = resp.maxSpinPerDay;
        currentUsername = resp.username;
        userUsernameSpan.innerText = currentUsername;
        remainingSpan.innerText = currentRemainingSpin;
        maxSpinSpan.innerText = currentMaxSpin;
        spinBtn.disabled = (currentRemainingSpin <= 0);
        resultDiv.innerHTML = currentRemainingSpin > 0 ? `Silakan putar roda (sisa ${currentRemainingSpin} spin)!` : "Anda sudah mencapai batas spin hari ini.";
        loginSection.style.display = 'none';
        wheelSection.style.display = 'block';
        localHistory = [];
        historyList.innerHTML = '<li>Memuat riwayat...</li>';
        
        // Ambil daftar hadiah
        const hadiahResp = await callBackend("getHadiahList");
        if (hadiahResp && Array.isArray(hadiahResp)) {
          HADIAH_DISPLAY = hadiahResp;
          SEGMENTS = HADIAH_DISPLAY.length;
          ANGLE_PER_SEG = (Math.PI * 2) / SEGMENTS;
          drawWheel(currentRotation);
        }
        
        // Ambil riwayat user
        const historyResp = await callBackend("getUserHistory", { username: currentUsername, limit: 10 });
        if (historyResp && Array.isArray(historyResp)) {
          localHistory = historyResp.map(h => `${new Date(h.timestamp).toLocaleTimeString()} → ${h.hadiah}`);
          historyList.innerHTML = localHistory.map(item => `<li>${item}</li>`).join('');
          if (localHistory.length === 0) historyList.innerHTML = '<li>Belum ada spin.</li>';
        } else {
          historyList.innerHTML = '<li>Belum ada riwayat.</li>';
        }
      } else {
        document.getElementById('loginMsg').innerText = resp.message;
      }
    } catch (err) {
      document.getElementById('loginMsg').innerText = 'Error: ' + err.message;
    } finally {
      loginBtn.disabled = false;
    }
  }

  function logout() {
    localStorage.removeItem('spinToken');
    currentToken = null;
    loginSection.style.display = 'block';
    wheelSection.style.display = 'none';
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginMsg').innerText = '';
    currentRotation = 0;
    if (HADIAH_DISPLAY.length) drawWheel(0);
  }

  // Proses spin
  async function doSpin() {
    if (spinning) return;
    if (currentRemainingSpin <= 0) {
      resultDiv.innerHTML = `⚠️ Anda sudah mencapai batas spin hari ini (${currentMaxSpin} kali). Coba lagi besok!`;
      return;
    }
    spinBtn.disabled = true;
    resultDiv.innerHTML = "🎲 Menentukan hadiah... 🎲";
    
    try {
      const resp = await callBackend("spin", { token: currentToken });
      if (resp.success) {
        const selectedHadiah = resp.hadiah;
        const idx = HADIAH_DISPLAY.findIndex(h => h.nama === selectedHadiah);
        if (idx !== -1) {
          await spinToSegment(idx);
          resultDiv.innerHTML = `🎉 ${resp.message} 🎉`;
          currentRemainingSpin = resp.remainingSpin;
          remainingSpan.innerText = currentRemainingSpin;
          spinBtn.disabled = (currentRemainingSpin <= 0);
          // Update riwayat lokal
          const timeStr = new Date().toLocaleTimeString();
          localHistory.unshift(`${timeStr} → ${selectedHadiah}`);
          if (localHistory.length > 10) localHistory.pop();
          historyList.innerHTML = localHistory.map(item => `<li>${item}</li>`).join('');
          if (currentRemainingSpin === 0) {
            resultDiv.innerHTML += `<br>⚠️ Sisa spin habis. Kembali besok!`;
          }
        } else {
          resultDiv.innerHTML = "Error: hadiah tidak ditemukan di roda";
        }
      } else {
        resultDiv.innerHTML = `❌ ${resp.message}`;
      }
    } catch (err) {
      resultDiv.innerHTML = "Error: " + err.message;
    } finally {
      if (!spinning) spinBtn.disabled = (currentRemainingSpin <= 0);
      else spinBtn.disabled = true;
    }
  }

  async function cekTokenOtomatis() {
    const token = localStorage.getItem('spinToken');
    if (!token) return;
    try {
      const resp = await callBackend("cekSesi", { token });
      if (resp.valid) {
        currentToken = token;
        currentRemainingSpin = resp.remainingSpin;
        currentMaxSpin = resp.maxSpinPerDay;
        currentUsername = resp.username;
        userUsernameSpan.innerText = currentUsername;
        remainingSpan.innerText = currentRemainingSpin;
        maxSpinSpan.innerText = currentMaxSpin;
        spinBtn.disabled = (currentRemainingSpin <= 0);
        resultDiv.innerHTML = currentRemainingSpin > 0 ? `Silakan putar roda (sisa ${currentRemainingSpin} spin)!` : "Anda sudah mencapai batas spin hari ini.";
        loginSection.style.display = 'none';
        wheelSection.style.display = 'block';
        
        const hadiahResp = await callBackend("getHadiahList");
        if (hadiahResp && Array.isArray(hadiahResp)) {
          HADIAH_DISPLAY = hadiahResp;
          SEGMENTS = HADIAH_DISPLAY.length;
          ANGLE_PER_SEG = (Math.PI * 2) / SEGMENTS;
          drawWheel(currentRotation);
        }
        
        const historyResp = await callBackend("getUserHistory", { username: currentUsername, limit: 10 });
        if (historyResp && Array.isArray(historyResp)) {
          localHistory = historyResp.map(h => `${new Date(h.timestamp).toLocaleTimeString()} → ${h.hadiah}`);
          historyList.innerHTML = localHistory.map(item => `<li>${item}</li>`).join('');
          if (localHistory.length === 0) historyList.innerHTML = '<li>Belum ada spin.</li>';
        }
      } else {
        localStorage.removeItem('spinToken');
      }
    } catch(e) {
      console.error(e);
    }
  }

  window.addEventListener('load', function() {
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    spinBtn.addEventListener('click', doSpin);
    cekTokenOtomatis();
  });
</script>
</body>
</html>
